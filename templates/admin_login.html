{% extends "base.html" %}
{% block title %}Admin Login - CBT Mock Exam{% endblock %}
{% block content %}
<div class="login-card">
  <div style="text-align:center;margin-bottom:28px;">
    <div style="font-size:3rem;">⚙️</div>
    <h2 class="page-title" style="text-align:center;margin-top:8px;">Admin Login</h2>
    <p style="color:var(--gray-600);font-size:.9rem;">Authorized personnel only.</p>
  </div>
  <div class="card">
    <div class="card-header" style="background:var(--blue-dark);">🔑 Administrator Access</div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label>Username</label>
          <input class="form-control" type="text" name="username" required placeholder="admin">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-control" type="password" name="password" required placeholder="••••••••">
        </div>
        <button class="btn btn-primary w-full btn-lg" style="justify-content:center;margin-top:8px;" type="submit">
          Login to Dashboard
        </button>
      </form>
    </div>
  </div>
  <div class="text-center mt-4">
    <a href="{{ url_for('index') }}" style="color:var(--gray-400);font-size:.85rem;">← Back to Home</a>
  </div>
</div>
{% endblock %}
